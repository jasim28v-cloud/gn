<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | SUPREME CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #050002; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .pink-void-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%);
        }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; }
        .crystal-frame { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* العلامة المائية الاحترافية */
        .v-watermark {
            position: absolute; top: 15%; left: 10%;
            font-family: 'Orbitron', sans-serif; font-size: 1rem;
            color: rgba(255, 255, 255, 0.2); pointer-events: none; z-index: 20;
            letter-spacing: 3px; animation: floatMark 8s infinite ease-in-out;
            text-shadow: 0 0 5px var(--neon);
        }
        @keyframes floatMark { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(20px, 30px); } }

        /* أيقونات التفاعل الجانبية المرفوعة */
        .side-actions { position: absolute; left: 22px; bottom: 180px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-btn { 
            width: 62px; height: 62px; border-radius: 24px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.4s; 
            background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
        }
        .action-btn i { font-size: 1.5rem; color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); }

        /* الشريط السفلي الأيوني */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 420px; height: 80px; border-radius: 40px; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(30px); 
            border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }

        .finger-admin { cursor: pointer; transition: 0.3s; color: var(--neon); }
        .finger-admin:active { transform: scale(0.8); }

        #upload-trigger { 
            background: var(--neon); box-shadow: 0 0 30px var(--neon); cursor: pointer; 
            width: 65px; height: 65px; border-radius: 25px; display: flex; align-items: center; justify-content: center;
            transform: translateY(-15px); border: 4px solid var(--bg);
        }

        /* لوحة التحكم السرية */
        #admin-panel {
            position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; padding: 40px 20px; backdrop-filter: blur(20px);
        }
        .video-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 10px;
        }

        #chat-overlay { position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.95); display: none; flex-direction: column; padding: 40px 25px; }
    </style>
</head>
<body>

    <div class="pink-void-bg"></div>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="finger-admin" onclick="openAdmin()">
            <i class="fas fa-fingerprint text-3xl"></i>
        </div>
        
        <div id="upload-trigger">
            <i class="fas fa-cloud-arrow-up text-2xl text-white"></i>
        </div>
        
        <div onclick="toggleChat()" style="color: rgba(255,255,255,0.4);">
            <i class="fas fa-comment-nodes text-2xl"></i>
        </div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-xl text-pink-500">ADMIN_TERMINAL</h2>
            <i class="fas fa-xmark text-3xl" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="flex-1 overflow-y-auto">
            </div>
    </div>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-pink-500 text-2xl">IONIC_CHAT</h2>
            <i class="fas fa-chevron-down text-3xl" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-4 flex gap-3">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-2xl p-4 outline-none border border-white/10" placeholder="Type message...">
            <button onclick="sendMsg()" class="bg-pink-600 px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const ADMIN_CODE = "1234";
        const AD_LINKS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"];
        let currentAd = 0;

        const firebaseConfig = { databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }

        // جلب الفيديوهات وتحديث الواجهة
        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = '';
            adminList.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                // واجهة الفيديو الرئيسية مع العلامة المائية
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="v-watermark">VØID_X SUPREME</div>
                        <video loop playsinline src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-actions">
                            <div class="action-btn" onclick="likeVideo('${id}')">
                                <i class="fas fa-heart-pulse"></i>
                                <span class="text-[10px] mt-1 font-bold">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="shareVideo()">
                                <i class="fas fa-paper-plane-vertical"></i>
                            </div>
                            <div class="action-btn" onclick="toggleChat()">
                                <i class="fas fa-message-captions"></i>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                // واجهة الحذف في لوحة التحكم
                adminList.innerHTML += `
                    <div class="video-item border-l-4 border-pink-600">
                        <video class="w-16 h-16 rounded-lg object-cover" src="${vid.url}"></video>
                        <span class="text-[10px] opacity-50 font-mono">${id.substring(0,10)}...</span>
                        <button onclick="deleteVideo('${id}')" class="bg-red-900/50 text-red-500 p-3 rounded-xl">
                            <i class="fas fa-trash-can"></i>
                        </button>
                    </div>
                `;
            });
            initObserver();
        });

        // وظائف لوحة التحكم
        function openAdmin() {
            const pass = prompt("برجاء إدخال كود الإدارة:");
            if(pass === ADMIN_CODE) {
                document.getElementById('admin-panel').style.display = 'flex';
            } else {
                alert("كود خاطئ!");
            }
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function deleteVideo(id) {
            if(confirm("هل أنت متأكد من حذف هذا الفيديو نهائياً؟")) {
                db.ref(`videos/${id}`).remove();
                alert("تم الحذف بنجاح");
            }
        }

        function likeVideo(id) { triggerAd(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function shareVideo() { triggerAd(); if(navigator.share) navigator.share({url: window.location.href}); }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.style.display = c.style.display==='flex'?'none':'flex'; }

        // محرك الرفع الاحترافي
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dpcysggzh", uploadPreset: "poro_go",
            maxFiles: 1, clientAllowedFormats: ["mp4", "mov", "webm"],
            styles: { palette: { window: "#050002", sourceBg: "#050002", windowBorder: "#ff007f", tabIcon: "#ff007f", menuIcons: "#ff007f", link: "#ff007f", action: "#ff007f", inProgress: "#ff007f", complete: "#20ff88", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { v.play().catch(()=>{}); } else { v.pause(); }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
