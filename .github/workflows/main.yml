name: Update DOKA Servers

on:
  schedule:
    - cron: '0 */3 * * *'  # كل 3 ساعات
  workflow_dispatch:        # تشغيل يدوي

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4

      - name: 🐍 تنصيب بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 تنصيب المكتبات
        run: pip install requests

      - name: 🚀 تشغيل سكريبت الكشط
        run: python scraper.py

      - name: 📤 رفع التغييرات للمستودع
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 تحديث تلقائي للسيرفرات $(date +'%Y-%m-%d %H:%M')" && git push)
